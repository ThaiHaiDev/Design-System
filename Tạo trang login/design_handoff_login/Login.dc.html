<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/verity-design-system-e79fdf30-4d78-4ff2-ae01-05e29c65acdd/tokens/fonts.css">
  <link rel="stylesheet" href="_ds/verity-design-system-e79fdf30-4d78-4ff2-ae01-05e29c65acdd/tokens/colors.css">
  <link rel="stylesheet" href="_ds/verity-design-system-e79fdf30-4d78-4ff2-ae01-05e29c65acdd/tokens/typography.css">
  <link rel="stylesheet" href="_ds/verity-design-system-e79fdf30-4d78-4ff2-ae01-05e29c65acdd/tokens/spacing.css">
  <link rel="stylesheet" href="_ds/verity-design-system-e79fdf30-4d78-4ff2-ae01-05e29c65acdd/tokens/effects.css">
  <link rel="stylesheet" href="_ds/verity-design-system-e79fdf30-4d78-4ff2-ae01-05e29c65acdd/tokens/base.css">
  <link rel="stylesheet" href="_ds/verity-design-system-e79fdf30-4d78-4ff2-ae01-05e29c65acdd/styles.css">
  <script src="_ds/verity-design-system-e79fdf30-4d78-4ff2-ae01-05e29c65acdd/_ds_bundle.js"></script>
</helmet>

<div style="min-height:100vh; width:100%; display:flex; align-items:center; justify-content:center; font-family:var(--font-body); background:var(--bg-primary); box-sizing:border-box; padding:var(--space-8) 0;">
  <div style="width:360px; flex-shrink:0; background:var(--bg-secondary); border:1px solid var(--border-default); border-radius:var(--radius-xl); box-shadow:var(--shadow-sm); padding:var(--space-8);">

    <div style="display:flex; flex-direction:column; align-items:center; text-align:center; margin-bottom:var(--space-6);">
      <div style="width:40px; height:40px; border-radius:var(--radius-md); background:var(--accent-primary); display:flex; align-items:center; justify-content:center; margin-bottom:var(--space-3);">
        <span style="font-family:var(--font-display); font-size:var(--text-lg); font-weight:var(--weight-extrabold); color:var(--text-inverse); line-height:1;">V</span>
      </div>
      <div style="font-family:var(--font-display); font-size:var(--text-3xl); font-weight:var(--weight-extrabold); letter-spacing:-0.02em; color:var(--text-primary); line-height:var(--leading-3xl);">Verity</div>
      <div style="font-size:var(--text-sm); color:var(--text-secondary); margin-top:4px;">Sign in to your account</div>
    </div>

    <div style="display:flex; flex-direction:column; gap:var(--space-3); margin-bottom:var(--space-6);">
      <x-import component-from-global-scope="VerityDesignSystem_e79fdf.Button" variant="secondary" size="lg" hint-size="100%,44px">
        <span style="display:inline-flex; align-items:center; justify-content:center; gap:var(--space-2);">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M23.52 12.27c0-.85-.08-1.67-.22-2.45H12v4.64h6.47a5.53 5.53 0 0 1-2.4 3.63v3h3.87c2.27-2.09 3.58-5.17 3.58-8.82Z"></path><path fill="#34A853" d="M12 24c3.24 0 5.95-1.07 7.94-2.91l-3.87-3c-1.08.72-2.45 1.15-4.07 1.15-3.13 0-5.78-2.11-6.73-4.95H1.27v3.1A12 12 0 0 0 12 24Z"></path><path fill="#FBBC05" d="M5.27 14.29a7.2 7.2 0 0 1 0-4.58v-3.1H1.27a12 12 0 0 0 0 10.78l4-3.1Z"></path><path fill="#EA4335" d="M12 4.75c1.76 0 3.35.6 4.6 1.79l3.44-3.44C17.94 1.19 15.24 0 12 0 7.31 0 3.26 2.69 1.27 6.61l4 3.1C6.22 6.86 8.87 4.75 12 4.75Z"></path></svg>
          Continue with Google
        </span>
      </x-import>
      <x-import component-from-global-scope="VerityDesignSystem_e79fdf.Button" variant="secondary" size="lg" hint-size="100%,44px">
        <span style="display:inline-flex; align-items:center; justify-content:center; gap:var(--space-2);">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.91.57.1.78-.25.78-.55 0-.27-.01-1.17-.02-2.12-3.2.7-3.88-1.36-3.88-1.36-.52-1.33-1.28-1.68-1.28-1.68-1.04-.71.08-.7.08-.7 1.15.08 1.76 1.18 1.76 1.18 1.03 1.75 2.7 1.25 3.36.96.1-.75.4-1.25.73-1.54-2.55-.29-5.24-1.28-5.24-5.68 0-1.25.45-2.28 1.18-3.08-.12-.29-.51-1.46.11-3.04 0 0 .96-.31 3.15 1.18a10.9 10.9 0 0 1 5.74 0c2.19-1.49 3.15-1.18 3.15-1.18.62 1.58.23 2.75.11 3.04.74.8 1.18 1.83 1.18 3.08 0 4.41-2.7 5.38-5.27 5.67.42.36.78 1.07.78 2.17 0 1.56-.02 2.82-.02 3.2 0 .3.21.66.79.55A11.5 11.5 0 0 0 23.5 12c0-6.35-5.15-11.5-11.5-11.5Z"></path></svg>
          Continue with GitHub
        </span>
      </x-import>

    </div>

    <div style="display:flex; align-items:center; gap:var(--space-3); margin-bottom:var(--space-6);">
      <div style="flex:1; height:1px; background:var(--border-default);"></div>
      <span style="font-size:var(--text-xs); color:var(--text-tertiary);">OR</span>
      <div style="flex:1; height:1px; background:var(--border-default);"></div>
    </div>

    <form onSubmit="{{ onSubmit }}" style="display:flex; flex-direction:column; gap:var(--space-4);">
      <x-import component-from-global-scope="VerityDesignSystem_e79fdf.Input" label="Email" type="email" placeholder="you@company.com" value="{{ email }}" onChange="{{ onEmailChange }}" size="lg" hint-size="100%,68px"></x-import>
      <div style="position:relative;">
        <x-import component-from-global-scope="VerityDesignSystem_e79fdf.Input" label="Password" type="{{ passwordFieldType }}" placeholder="••••••••" value="{{ password }}" onChange="{{ onPasswordChange }}" size="lg" hint-size="100%,68px"></x-import>
        <button type="button" onClick="{{ onTogglePassword }}" aria-label="Toggle password visibility" style="position:absolute; right:var(--space-3); bottom:0; height:44px; width:20px; display:flex; align-items:center; justify-content:center; background:none; border:none; padding:0; cursor:pointer; color:var(--text-tertiary);">
          <sc-if value="{{ showPassword }}" hint-placeholder-val="{{ false }}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          </sc-if>
          <sc-if value="{{ hidePassword }}" hint-placeholder-val="{{ false }}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l18 18"></path><path d="M10.6 10.6a2 2 0 0 0 2.8 2.8"></path><path d="M9.9 5.1A9.4 9.4 0 0 1 12 5c6.5 0 10 7 10 7a13.2 13.2 0 0 1-3.1 3.9M6.2 6.2C3.6 7.9 2 12 2 12s3.5 7 10 7a9.4 9.4 0 0 0 4.2-.9"></path></svg>
          </sc-if>
        </button>
      </div>
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <x-import component-from-global-scope="VerityDesignSystem_e79fdf.Checkbox" label="Remember me" checked="{{ remember }}" onChange="{{ onRememberChange }}" hint-size="auto,24px"></x-import>
        <a href="#" style="font-size:var(--text-sm); color:var(--accent-primary); text-decoration:none;">Forgot password?</a>
      </div>
      <x-import component-from-global-scope="VerityDesignSystem_e79fdf.Button" type="submit" variant="primary" size="lg" hint-size="100%,44px">Sign in</x-import>
    </form>

    <div style="text-align:center; margin-top:var(--space-6); font-size:var(--text-sm); color:var(--text-secondary);">
      Don't have an account? <a href="#" style="color:var(--accent-primary); text-decoration:none; font-weight:var(--weight-medium);">Sign up</a>
    </div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { email: "", password: "", remember: true, showPassword: false };

  renderVals() {
    return {
      email: this.state.email,
      password: this.state.password,
      remember: this.state.remember,
      showPassword: this.state.showPassword,
      hidePassword: !this.state.showPassword,
      passwordFieldType: this.state.showPassword ? "text" : "password",
      onEmailChange: (e) => this.setState({ email: e.target.value }),
      onPasswordChange: (e) => this.setState({ password: e.target.value }),
      onRememberChange: (e) => this.setState({ remember: e.target.checked }),
      onTogglePassword: () => this.setState(s => ({ showPassword: !s.showPassword })),
      onSubmit: (e) => { e.preventDefault(); },
    };
  }
}
</script>
</body>
</html>
