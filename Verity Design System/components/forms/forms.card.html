<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;padding:20px;background:var(--bg-primary);}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Button, Input, Checkbox, Switch } = window.VerityDesignSystem_e79fdf;
function Demo() {
  const [checked, setChecked] = React.useState(true);
  const [on, setOn] = React.useState(true);
  return (
    <div style={{display:"flex", flexDirection:"column", gap:16, fontFamily:"var(--font-body)"}}>
      <div style={{display:"flex", gap:12, flexWrap:"wrap"}}>
        <Button variant="primary">Primary</Button>
        <Button variant="secondary">Secondary</Button>
        <Button variant="ghost">Ghost</Button>
        <Button variant="destructive">Delete</Button>
        <Button variant="primary" disabled>Disabled</Button>
      </div>
      <div style={{display:"flex", gap:12, alignItems:"flex-start", flexWrap:"wrap"}}>
        <Input label="Email" placeholder="you@company.com" style={{width:200}}/>
        <Input label="Password" type="password" error="Required" style={{width:200}}/>
        <Checkbox label="Remember me" checked={checked} onChange={e=>setChecked(e.target.checked)} />
        <Switch label="Notifications" checked={on} onChange={e=>setOn(e.target.checked)} />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
