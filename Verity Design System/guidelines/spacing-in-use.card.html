<!-- @dsCard group="Spacing" viewport="700x140" name="Card Padding In Use" subtitle="space-6 inside, space-4 gap" -->
<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:16px;background:var(--bg-primary);font-family:var(--font-body);}
.row{display:flex;gap:var(--space-4);}
.card{background:#fff;border:1px solid var(--border-default);border-radius:var(--radius-lg);padding:var(--space-6);flex:1;box-shadow:var(--shadow-xs);font-size:13px;color:var(--text-secondary);}
</style></head><body>
<div class="row">
<div class="card">padding: space-6 (24px)</div>
<div class="card">gap: space-4 (16px)</div>
</div>
</body></html>
