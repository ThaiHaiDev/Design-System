<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:16px;background:var(--bg-primary);font-family:var(--font-body);}
.row{display:flex;gap:16px;align-items:center;}
.sw{width:64px;height:64px;background:var(--accent-primary-subtle);border:1px solid var(--accent-primary);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--accent-primary);font-family:var(--font-mono);}
</style></head><body>
<div class="row">
<div class="sw" style="border-radius:var(--radius-sm)">sm</div>
<div class="sw" style="border-radius:var(--radius-md)">md</div>
<div class="sw" style="border-radius:var(--radius-lg)">lg</div>
<div class="sw" style="border-radius:var(--radius-xl)">xl</div>
<div class="sw" style="border-radius:var(--radius-full)">full</div>
</div>
</body></html>
