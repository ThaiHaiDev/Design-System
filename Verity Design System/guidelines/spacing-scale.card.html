<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:16px;background:var(--bg-secondary);font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);}
.row{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.bar{background:var(--accent-primary);height:12px;border-radius:2px;}
.tag{width:70px;flex-shrink:0;}
</style></head><body>
<div class="row"><span class="tag">space-1</span><div class="bar" style="width:4px"></div></div>
<div class="row"><span class="tag">space-2</span><div class="bar" style="width:8px"></div></div>
<div class="row"><span class="tag">space-3</span><div class="bar" style="width:12px"></div></div>
<div class="row"><span class="tag">space-4</span><div class="bar" style="width:16px"></div></div>
<div class="row"><span class="tag">space-6</span><div class="bar" style="width:24px"></div></div>
<div class="row"><span class="tag">space-8</span><div class="bar" style="width:32px"></div></div>
<div class="row"><span class="tag">space-12</span><div class="bar" style="width:48px"></div></div>
<div class="row"><span class="tag">space-16</span><div class="bar" style="width:64px"></div></div>
</body></html>
