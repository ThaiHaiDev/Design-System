<!-- @dsCard group="Type" viewport="700x260" name="Type Scale" subtitle="Inter — sizes xs to 5xl" -->
<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:16px;background:var(--bg-secondary);font-family:var(--font-body);}
.row{display:flex;align-items:baseline;gap:12px;border-bottom:1px solid var(--border-default);padding:6px 0;}
.tag{width:110px;flex-shrink:0;font-size:11px;color:var(--text-tertiary);font-family:var(--font-mono);}
</style></head><body>
<div class="row"><span class="tag">text-5xl / 800</span><span style="font-size:var(--text-5xl);font-weight:800;">Verity</span></div>
<div class="row"><span class="tag">text-3xl / 700</span><span style="font-size:var(--text-3xl);font-weight:700;">Page title</span></div>
<div class="row"><span class="tag">text-xl / 600</span><span style="font-size:var(--text-xl);font-weight:600;">Section heading</span></div>
<div class="row"><span class="tag">text-lg / 600</span><span style="font-size:var(--text-lg);font-weight:600;">Card title</span></div>
<div class="row"><span class="tag">text-base / 400</span><span style="font-size:var(--text-base);">Body text at 16px</span></div>
<div class="row"><span class="tag">text-sm / 400</span><span style="font-size:var(--text-sm);">Body text at 14px</span></div>
<div class="row"><span class="tag">text-xs / 400</span><span style="font-size:var(--text-xs);color:var(--text-secondary);">Caption / helper text</span></div>
</body></html>
