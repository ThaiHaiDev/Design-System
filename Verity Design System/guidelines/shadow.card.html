<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:24px 16px;background:var(--gray-100);font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);}
.row{display:flex;gap:24px;}
.sw{width:80px;height:56px;background:#fff;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;}
</style></head><body>
<div class="row">
<div class="sw" style="box-shadow:var(--shadow-xs)">xs</div>
<div class="sw" style="box-shadow:var(--shadow-sm)">sm</div>
<div class="sw" style="box-shadow:var(--shadow-md)">md</div>
<div class="sw" style="box-shadow:var(--shadow-lg)">lg</div>
<div class="sw" style="box-shadow:var(--shadow-xl)">xl</div>
</div>
</body></html>
